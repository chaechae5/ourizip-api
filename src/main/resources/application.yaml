spring:
  application:
    name: ourizip-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ourizip}
    username: ${DB_USERNAME:ourizip}
    password: ${DB_PASSWORD:ourizip}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update   # TODO: Flyway 마이그레이션으로 교체 (프로덕션 이전)
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  security:
    enabled: false  # TODO: JWT 구현 후 제거
